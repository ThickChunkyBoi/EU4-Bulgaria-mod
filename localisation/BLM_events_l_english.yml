l_english:
flavor_bul.1.t:0 "Bulgarian Liberation"
flavor_bul.1.d:0 "The end of the crusade in Varna wasn't a complete failure. Even though Vladislav III was killed and the crusader crushed, the Ottomans also suffered heavy losses that will surely undermine their continuous expansion in the Balkans. This will give us time to prepare for a future confrontation with the turks and defend our liberty in the battlefield. But until this war comes - LONG LIVE BULGARIA!"
flavor_bul.1.a:0 "Long live Bulgaria!"
flavor_bul.1.b:0 "LONG LIVE BULGARIA!"
flavor_bul.2.t:0 "Bulgarian-Ottoman War of Revenge"
flavor_bul.2.d:0 "The war between us and the turks has started. For the past years we have prepared for this moment. Our people ready to supply our war efforts with manpower and resources. Our military is ready to fight till the last man alive against the heathens. The estates are seeking internal and external support and funding for the war. Toghether, with our allies, we will push back the infidels back into the rat's den they crawled from."
flavor_bul.2.a:0 "The time has come. ALL MEN TO ARMS!"
flavor_bul.3.t:0 "Defended our Liberation"
flavor_bul.3.d:0 "The war is over. We are victorius. The Ottomans are defeated and their army lay dead by our weapons. Let this day be known as the day Bulgaria, and its allies, defended Europe from the muslim plague. We must make the old capital - Tarnovo - as our new capital. Doing so will show to the entire Europe that Bulgaria is not dead."
flavor_bul.3.a:0 "Let the Tsar reign from our old capital - Tarnovo."
flavor_bul.4.t:0 "Military Academy 'Tsar Simeon'"
flavor_bul.4.d:0 "Our rapid militazitaion demands better trained soldiers. The Tsar approves the construction of an military academy aiming towards military education for everyone who wants to join the military. The name for the university is chosen unanimously to be the name of our first Tsar - Tsar Simeon."
flavor_bul.4.a:0 "Our soldiers and general will recieve the best education."
flavor_bul.5.t:0 "Naval Academy 'Khan Kubrat'"
flavor_bul.5.d:0 "Bulgaria has never possesed a navy in its history. Our current creating of a navy demands training for a sailors and admirals to command them. The Tsar believes that Varna is the best city to establish a naval academy. The name for that university is chosen to be the name of the father of our founder - Khan Kubrat."
flavor_bul.5.a:0 "Our sailors will receive the best training in the world."
flavor_bul.6.t:0 "The Reformed Bulgarian Army"
flavor_bul.6.d:0 "Our continuous funding of our military and creating of a navy and the harsh training of our personell is paying off. Throughout the world, the bulgarian army is seen as the most disciplined and well-trained military. Let all our enemies and rival cower before our marching army and grand fleet."
flavor_bul.6.a:0 "Our army is the greatest."
flavor_bul.7.t:0 "Take the initiative"
flavor_bul.7.d:0 "With the defeat of the Ottomans, we now stand on a crossroad. Our advisors and military commanders propose 3-way conquests. The first propose is a northern expansion through the romanian lands and Crimea. The second one is towards the west through the Balkans and invasion of southern Italy and striking the Papacy, mending the Schism. The third propose is going south, completing the conquering of the east Balkans, going through Anatolia and striking the heart of Islam. The Tsar soon will choose where to focus first."
flavor_bul.7.a:0 "Focus on the south."
flavor_bul.7.b:0 "Focus on the west."
flavor_bul.7.c:0 "Focus on the north."
flavor_bul.8.t:0 "The Serbian Question!"
flavor_bul.8.d:0 "Conquering the Kingdom of Serbia is opening a new problem. The serbs are too hostile against our authorities. The Tsar ask his advisors to find a solution of the problem. The first solution is forcfully assimilating them into the bulgarian culture, it will take a long time to fully erase the serbian identity. The second one is giving them autonomy and fully integrate them into our administration, there will be a lot of investment to pacify them."
flavor_bul.8.a:0 "Integrate the serbs"
flavor_bul.8.b:0 "Assimilate the serbs"
flavor_bul.9.t:0 "Prepare Italina Invasion"
flavor_bul.9.d:0 "After we finish the conquest of the West Balkans the time has come to focus on Italy. There is too much strong opponents in North Italy and beating them will be too costly. The Court has decided instead going from the north, we can prepare an invasion through the south where the weak Naples is an easy target for a amphibious invasion."
flavor_bul.9.a:0 "Moving an entire army with ships is a hard job."
flavor_bul.10.t:0 "Supremacy over Italy"
flavor_bul.10.d:0 "With the conquest of Sicily, Corsica and Sardinia, we are surrounding whole Italy. This gives us an unique opportunity to influence the italian cities into accepting our dominance over them. The islands can become a center of trade in the western Mediterranean Sea - in spite of the french and spaniards."
flavor_bul.10.a:0 "Our Domination is imminent."
flavor_bul.11.t:0 "The Berber Threat"
flavor_bul.11.d:0 "In the Mediterranean Sea, the berber pirates pillage and steal from everyone. Fortifying Malta will give us 2 options of how to deal with them. The first one is to heavy fortify Malta even more to be able to dock an entire fleet ready to strike the pirates if seen around our coasts. The other one is to take the initiative and strike North Africa and subjugate them and force them to server under us."
flavor_bul.11.a:0 "The Berber pirates won't stand a chance against our fleet."
flavor_bul.11.b:0 "It is time to take the matter in our hands."
flavor_bul.12.t:0 "Aftermath of the Conquest"
flavor_bul.12.d:0 "Rome has fallen under our flag. Rome is not just the capital of the catholicism, it is also the capital of the ancient Roman Empire. If we want to take the mantle of the empire for us, that city must stay in our control. With the Papacy fleeing from the city, the catholicism is weakened. A patriarch is installed in Rome - in spite of the Pope."
flavor_bul.12.a:0 "Roma is ours"
flavor_bul.13.t:0 "The Romanian Question!"
flavor_bul.13.d:0 "Kingdom of Wallachia, Kingdom of Moldavia and the transylvanian lands are under our administration. Here rises the same question as in Serbia. Because the romanians are a lot it may be hard to assimilate but integrating them will anger some circles in our society. A tough decision for the Tsar."
flavor_bul.13.a:0 "Assimilate them."
flavor_bul.13.b:0 "Integrate them."
flavor_bul.14.t:0 "Macedonian Liberation"
flavor_bul.14.d:0 "Macedonia is a vital part of our realm. It's population is majority bulgarian but it wasn't liberated alongside the core teritories and because of that the turks took their revenge on them. The turks mass murdered villages for a punishment. No more! Now their are united with their brethren in a realm where these bloodthirsty behaviour is unacceptable."
flavor_bul.14.a:0 "Bulgarians around our realm celebrate."
flavor_bul.15.t:0 "The Albanian Question!"
flavor_bul.15.d:0 "Conquereing of the albanian kingdom pose in front of us a question - what to do with the albanians. Because of our friendly opinion to one another their assimilation or integration decision will be far easy."
flavor_bul.15.a:0 "Integrate the albanians"
flavor_bul.15.b:0 "Assimilate the albanians"
flavor_bul.16.t:0 "Aftermath of the conquest of Tsarigrad"
flavor_bul.16.d:0 "Constantinople has fallen in our hands. The capital of the Second Rome will become our new capital. Nationwide celebration last for days. But in the court the most important decision is yet to be made. Some believe that we must take the mantle of second rome and proclaim an Empire. Others believe that we must let Sedond Rome die and proclaim a New Rome - Third Rome. The Tsar as a head of the realm must decide."
flavor_bul.16.a:0 "Proclaim §PThe Bulgarian Empire§!."
flavor_bul.16.b:0 "Proclaim §RThird Rome§!."
flavor_bul.17.t:0 "Costly Victory at Varna"
flavor_bul.17.d:0 "Our victory over the crusaders in Varna isn't feeling like a victory. Thousands of our men are dead, the Sultan injured, 4 ships destroyed and a city in ashes. But this is not the worst. The byzantenes, albanians, venetians, serbians and the other beyliks in Anatolia see our defeat as a weakness. Worrying news are the bulgarian nobles declare liberation and invite a decendant of House Shishman to sit on the throne. With weakened military and a lot of enemies in the Balkans, the coming years will be challenging for our integrity."
flavor_bul.17.a:0 "Hard times are ahead of us."
flavor_bul.18.t:0 "Holy City of Islam"
flavor_bul.18.d:0 "With the support of the Tsar in Tsarigrad, we are converting the arabs in orthodoxy for years. Today we got to Mecca - the holy city of Islam. Converting this city will deal a huge blow on the muslim world. The destruction of Kaaba and converting of Mecca will surely give us the good eye of Bulgaria to favor us among the others who are converting the muslim."
flavor_bul.18.a:0 "A crushing defeat for the Islam."
bul_religion.1.t: "The Orthodoxy Question"
bul_religion.1.d: "The winds of Reformation are gathering over our realm, a furious debates in the big cities and the royal palace are questioning the importance of the religion. We must act fast to prevent the looming disaster over the Tsardom."
bul_religion.1.a: "Let the debates begin!"
bul_religion.2.t: "End of the debates"
bul_religion.2.d: "For years we are trying to manuevour around the fires of the Reformation. Only time will tell if our current path is the right one."
bul_religion.2.a: "The Tsardom has achieved religious peace."
bul_religion.3.t: "The Bulgarian Consort"
bul_religion.3.d: "Our consort is part of the Reformation and the debates. Their influence will elevate our status around Europe."
bul_religion.3.a: "The Tsar will not intervene in this matter."
bul_religion.4.t: "Seek help from our Allies"
bul_religion.4.d: "While the looming chaos in our realm is getting close, we could try and seek aid from our orthodox allies who can help us resist the Reformation. Not everyone is keen to seek help. The Tsar will have the final word."
bul_religion.4.a: "Write a letter to our religious brethren."
bul_religion.4.b: "Seeking help will show weakness that our enemies are waiting for."
bul_religion.5.t: "The Raging Chaos - Mild Protest"
bul_religion.5.d: "Angered mobs are arming against the Crown. They aren't a lot and can be easy to deal with. The aid we asked is paying off."
bul_religion.5.a: "Disperse them!"
bul_religion.6.t: "The Raging Chaos - The Looming Flames"
bul_religion.6.d: "Angered mobs are arming against the Crown. Large crowds of people are seeing us as prideful arrogants and are seriously threating the integrity of our realm. The Tsar has mobilised the Army."
bul_religion.6.a: "Crush them!"
bul_religion.7.t: "The Capital in Flames"
bul_religion.7.d: "The violence in the city is extreme. The royal family is evacuated and the army is called in to sweep the streets, disperse the armed rebels, capture their leaders and bring them before the Tsar for punishment."
bul_religion.7.a: "All who threaten the Tsardom of Bulgaria will be punished."
bul_religion.8.t: "First Thoughts"
bul_religion.8.d: "With all intelectuals of Bulgaria, the patriarchs and the royal family discussing the situation with the religion, 2 possible outcomes are presented before His Majesty. Funding the Bulgarian Orthodox Patriarchy and allowing it to reafirm the orthodox values, this will slightly improve our situation. The other is to send envoy to Rome, the populace will react harshly but will streghten the royal power. The Tsar will dictate our next steps."
bul_religion.8.a: "Fund the patriarchschs!"
bul_religion.8.b: "Damn them! Send the envoys!"
bul_religion.9.t: "The Next step"
bul_religion.9.d: "After some years of instability, the Tsar has called everyone to discuse their next step in preventing total destruction. With enough government funding, the Patriarchy could enforce the orthodox traditions among the people. Some patriarchs are concern that excessive funding of the state threaten the soverenity of the Church. Some are willing to allow western intelectuals from Italy to help us stabilise the state."
bul_religion.9.a: "Fund the Church in spite of some of their complains!"
bul_religion.9.b: "Contact some of the great minds of the Italian peninsula!"
bul_religion.10.t: "The Light in the Tunnel"
bul_religion.10.d: "With the collective minds of the greatest people of Bulgaria, we stopped the flames of the Reformation and now usher towards a new path. Fore some this might not be the right path but so far the realm is back at peace and ready to follow this path together."
bul_religion.10.a: "The Orthodoxy is and always will be one of the pillars of the state."
bul_religion.10.b: "Join forces with the Papacy and strike fear in the Reformation."
bul_religion.10.c: "The time has come to officialy fuse the Crown with the Church, reshaping the religion forever."
BLM_first_thoughts_title: "First Thoughts of the situation."
BLM_first_thoughts_desc: "The Tsar has summoned the intelectuals of the state to convene of their first actions to stop the flames of the Reformation."
BLM_execution_title: "The Next Step"
BLM_execution_desc: "After their first convention, His Majesty has called them again to capitalize on the improvements made by their first actions years ago."
BLM_new_tommorow_title: "The New Tommorow"
BLM_new_tommorow_desc: "The Tsar's attempts to reform and stabilise the realm have proven succsessfull. Let us continue forward to achieve greatness forever together."
rorthodox: "Reformed Orthodox"
rorthodox_religion_desc: "While the fires of the Reforamtion raged around Europe and started to loom over Bulgaria, great intelectuals, the patriarchs of the Bulgarian Orthodox Patriarchy and the general popule wanted reform and defence against the Reformation. With numerous fundings, decisions and bloodsheds, the Tsar has reigned over the fires and stabilised the realm. The Church, expected to have a say in the new reformed state, were completely assimilated under the Royal Crown. With this fusion was created a new religion, in which the church will not exploit the common men but it will serve them the same way the Crown has. This is yet another succsessful centralizing of all power under the Tsar."
rorthodox_rebels_demand: "Convert $COUNTRYNAME$"
rorthodox_rebels_demand_desc: "This new reformed faith doesn't stray from the orthodoxy a lot and the others see it as an instrument for the Bulgarian Tsar to assert control over them. These rebels knowingly or unknowingly are helping the Bulgarian Monarch's dominance in the world."
rorthodox_rebels_title: "Religious"
rorthodox_rebels_name: "$RELIGION$ Zealots"
rorthodox_rebels_desc: "Those religious fanatics are people brainwashed by the few agents sent by the Bulgarian Tsardom to destabalize their enemies from within."
rorthodox_rebels_army: "$RELIGION$ Army"
orthodox_question: "Question of Orthodoxy in Bulgaria"
desc_orthodox_question: "With the Reformation raging across Western Europe, some of our people are also starting to question what role religion will play in our country."
