l_english:
BLM_bul_ideas:0 "Bulgarian Ideas"
BLM_bul_ideas_bonus:0 "Bulgarian Ambitions"
BLM_bul_ideas_start:0 "Bulgarian Traditions"
BLM_bul_idea.1:0 "Freedom At Last"
BLM_bul_idea.1_desc:0 "Since the fall of Vidin in 1396, bulgarian rebel tried countless times to liberate the bulgarian lands from the Ottomans. The costly victory of the turks in Varna gives us a chance to break free from them."
BLM_bul_idea.2:0 "Unity Makes Power"
BLM_bul_idea.2_desc:0 "We must stay united so we can keep our freedom safe from the others would-be-conquerers around us such as the turks from the south and Hungary from the north."
BLM_bul_idea.3:0 "Reign In The Estates"
BLM_bul_idea.3_desc:0 "The estates pose a threat to our internal unity with their power hungry ambitions. The Tsar must take complete control over them in order to centralize the realm and eliminate any internal enemy break us apart from inside."
BLM_bul_idea.4:0 "Rapid Military Rearment"
BLM_bul_idea.4_desc:0 "The Bulgarian Army must be a backbone of the realm in order to keep us safe and be ready for a future expansion in the Balkans."
BLM_bul_idea.5:0 "Expansion Of The Trade"
BLM_bul_idea.5_desc:0 "Our position in the middle of the trade routes between Europe and Asia gives us an oppurtunity to expand our trade far beyond. If we invest in our trade, Bulgaria will dominate the shortest trade route between the two continents."
BLM_bul_idea.6:0 "Fund The Bulgarian Navy"
BLM_bul_idea.6_desc:0 "Bulgarian Empire of old didnt invest in navy. That was a mistake. We must begin a creation of a grand fleet in order to control the Black Sea. A navy of our own can help us capture the City of World's Desire - Constantinopol and expand our nation into the Mediterranean Sea."
BLM_bul_idea.7:0 "Third Rome"
BLM_bul_idea.7_desc:0 "We are finally able to drive the turks from the Balkans and recapture Constantinopol in the name of the Tsar. Bulgaria can take the mantle of the "Third Rome". Let everyone hear and see the New Bulgarian Empire - risen from the ashes like a phoenix."
THIRD_ROME:1 "Third Rome"
THIRD_ROME_ADJ:1 "Roman"
BULGARIAN_EMPIRE:1 "Bulgarian Empire"
BULGARIAN_EMPIRE_ADJ:1 "Bulgarian"
BLM_bgc_ideas:2 "Shishmanite Ideas"
BLM_bgc_ideas_bonus:2 "Shishmanite Ambitions"
BLM_bgc_ideas_start:2 "Shishmanite Traditions"
BLM_bgc_idea.1:2 "The New Administration"
BLM_bgc_idea.1_desc:2 "After our conquest of vital chinese cities, the administration of these provinces is made of bulgarians. We will pacify the chinese and force them to accept their new masters."
BLM_bgc_idea.2:2 "Align The Estates"
BLM_bgc_idea.2_desc:2 "The chinese estates are a threat to our government if they are not dealth with. Giving them concessions will surely pacify and align them with our new administration."
BLM_bgc_idea.3:2 "Iron Rule"
BLM_bgc_idea.3_desc:2 "The chinese population is trying to resist our rule. We will impose harsher treatment against them. They will not stop the rise of the new dynasty."
BLM_bgc_idea.4:2 "Bulgarisation If The Army"
BLM_bgc_idea.4_desc:2 "With our new administration, comes our military tactics. We will train those who are loyal to us and modernise their equipment to match the Bulgarian standart."
BLM_bgc_idea.5:2 "Christianisation Of China"
BLM_bgc_idea.5_desc:2 "The chinese will now accept a foreign religion to take the Mandate. But what if all of china is christian. Surely this will convince them of the need of a Christion Celestial Empire."
BLM_bgc_idea.6:2 "Bulgarisation Of The Navy"
BLM_bgc_idea.6_desc:2 "Our navy is far superior of the chinese one or of any asian. Modernising and expanding the chinese navy, we will be able to dominate Asia and even to pressure the japanese Shogun."
BLM_bgc_idea.7:2 "New Trade Policies"
BLM_bgc_idea.7_desc:2 "The chinese dynasties, in the past, were focusing on their domestic trading. Now with bulgarian guidance we will open the chinese market and enrich ourselves and bring the riches of China to the Bulgarian Capital."
BLM_chinese_trade_title:2 "Chinese Trade Benefits"
BLM_chinese_trade_desc:2 "Our administration in China is expanding on the asian trade theather. All riches of China are coming towards us. From now on the chinese population will work for the enrichment of our Tsardom."
BLM_asian_puppets_title:2 "Resolve of the Korean and Tibetian questions"
BLM_asian_puppets_desc:2 "Our government has decided what to do with those 2 kingdoms. We will accept their decision."