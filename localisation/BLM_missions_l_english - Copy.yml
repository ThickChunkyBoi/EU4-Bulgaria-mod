l_english:
BLM_bul_liberation_title:0 "Bulgarian Liberation"
BLM_bul_liberation_desc:0 "Bulgaria is once again on the world map. This time it will stay there forever."
BLM_seek_support_title:0 "Seek Foreign Support"
BLM_seek_support_desc:0 "There are others who hold a grudge against the Ottomans. The Byzantines are seeking even from their arch-enemy - The Pope, albanians are in open rebellion and are supported by the venetians and Aragon. We should propose a joing offansive against our common enemy."
BLM_infiltrate_tarnovo_title:0 "Tarnovo Infiltration"
BLM_infiltrate_tarnovo_desc:0 "With forming an alliance, we can focus on destabilize the conquered bulgarian teritories. Let us burn the Ottomans from outside and inside."
BLM_castle_in_vidin_title:0 "Vidin Castle"
BLM_castle_in_vidin_desc:0 "We must fortify our current capital - Vidin, in case of third party intervention in our struggle against the turks."
BLM_gather_the_army_title:0 "Gather An Army"
BLM_gather_the_army_desc:0 "We need an army for our future campaign against the Ottomans. There are a lot of people from our border and from the teritories still under the turks who are willing to fight for freedom."
BLM_war_with_the_turks_title:0 "War With The Ottomans"
BLM_war_with_the_turks_desc:0 "The has come. The war aginst the Ottomans is declared. Let us fight with all our strenght and with high morale versus the muslim threat. With the help of our allies we can even push them back from Europe - never to return again."
BLM_defended_freedom_title:0 "Liberation Defended"
BLM_defended_freedom_desc:0 "The war is over. The turks are beaten and humiliated. Our liberation is preserved. Today is a celebration for whole Europe our victory agains the muslim terror."
BLM_militarization_title:0 "Militarization"
BLM_militarization_desc:0 "We may have achieved victory but the Ottomans are still standing. We must stay vigilant for their revenge or someone else looking for an opportunity to influence the Balkans."
BLM_fund_the_cavalry_title:0 "Fund The Cavalry"
BLM_fund_the_cavalry_desc:0 "The bulgarian cavalry was always feared by our enemies. We must invest in a new horsemen and instill fear in our enemies once again."
BLM_create_artillery_title:0 "Create Artillery"
BLM_create_artillery_desc:0 "Fortified cities were always almost impossible to take. We shall create artillery regiments to brute force the every wall in front of our army."
BLM_national_military_academy_title:0 "Military Academy"
BLM_national_military_academy_desc:0 "Military Academy 'Tsar Simeon' is the newly established universety in Nikopol. With strict discipline and hard working it can produce the best soldiers for our army."
BLM_naval_academy_title:0 "Naval Academy"
BLM_naval_academy_desc:0 "Naval Academy 'Khan Kubrat' is the university aiming towards producing sailors and admirals for our newly established navy. The best sailors will win naval battles even with outdated ships."
BLM_build_a_navy_title:0 "Build A Navy"
BLM_build_a_navy_desc:0 "In the past, Bulgaria didn't rely on navy to defend itself. Now with our borders expanding beyound our previous greatest expansion, we need a fully maintained navy and naval personel to defend our shores against enemy states and the biggest threat in the Mediterranean Sea - the Berber pirates."
BLM_further_naval_rearment_title:0 "Further Naval Rearment"
BLM_further_naval_rearment_desc:0 "Our initial investment in our fleet was a success. We must push our engineers to expand our production of ships to exent our navy reach to better defend our coastlines."
BLM_professional_bulgarian_army_title:0 "The Bulgarian Army"
BLM_professional_bulgarian_army_desc:0 "Our focus on expanding the military and better train our soldiers paid off. Now everyone will fear when they hear the the Great Bulgarian Army begin to march. Let our enemies be crushed under the boots of our soldiers and sunk by our navy."
BLM_take_the_initiative_title:0 "Draw Battleplans"
BLM_take_the_initiative_desc:0 "With the Ottomans defeated, we must take the initiative to expand our realm in every direction. The western kingdoms falling under the influence of the HRE emperors, venetians and hungarians. The romanians in the north are weak and pressured by the expansionist kingdoms and in the south lies the beaten Ottomans and our oldest enemy and rival - Byzantium."
BLM_conquer_wallachia_title:0 "Conquer Wallachia"
BLM_conquer_wallachia_desc:0 "The last free romanians kingdom is heavily pressured by Hungary. We must intervene and put them under our flag."
BLM_transylvanian_campaign_title:0 "Transylvanian Campaign"
BLM_transylvanian_campaign_desc:0 "With the fall of Wallachia, the confrontation between us and Hungary is inevitable. We must launch a pre-emptive campaign against them and secure Transylvanian forts for a better defensive line."
BLM_unite_the_romanians_title:0 "Unite The Romanians"
BLM_unite_the_romanians_desc:0 "Moldavia is the last romanian realm. They had already fallen under the influence of the polish king. We must continue our expansion in the romanian lands. The poles won't be happy about our plans for Moldavia."
BLM_expand_into_crimea_title:0 "Expand Into Crimea"
BLM_expand_into_crimea_desc:0 "The Ottomans are making a deal with the crimean khan against us. With the conquest of the romanian lands we have a direct route into crimea. We must strike the khan before they fully align with the sultan."
BLM_alliance_with_russia_title:0 "Alliance With Russia"
BLM_alliance_with_russia_desc:0 "The russian people are struggling for decades under the tatar yoke. They are also our religious and culture brethren and are a perfect candidate for an alliance in the north. With the integration of the crimean lands, we also have a border with the tatars. We can begin a jaoint operation against them and drive them out of the Europe."
BLM_union_with_russia_title:0 "Union With Russia"
BLM_union_with_russia_desc:0 "Our continuous support to the russian tsar is paying off. We now have a claim on their throne. We will bite our time and when the time comes we will add the russian tsardom into our empire."
BLM_conquer_serbia_title:0 "Conquer Serbia"
BLM_conquer_serbia_desc:0 "Since the Second Bulgarian Empire, the serbs were a nuisance for our development. The has come to take them under the bulgarian control and pacify them forever."
BLM_expand_into_the_west_balkans_title:0 "West Balkan Expansion"
BLM_expand_into_the_west_balkans_desc:0 "The habsburgs, hungarians and venetians are eying the western balkans for decades. After we dealth with Serbia, we must try to establish our sphere of influence in the region and block our rivals to close on our borders."
BLM_foothold_in_south_italy_title:0 "Foothold In South Italy"
BLM_foothold_in_south_italy_desc:0 "The east roman empire was rulling over the south Italy. If we want to take the mantle of Rome, it is our destiny to rule over Italy."
BLM_dismantle_naples_title:0 "Dismantle Naples"
BLM_dismantle_naples_desc:0 "The Kingdom of Naples is the biggest obstacle in our campaign in South Italy. They could become even bigger obstacle if they fall under the frech crown. That must not happen. We must take control of Naples through conquest or an union."
BLM_conquer_rome_title:0 "Conquer Rome"
BLM_conquer_rome_desc:0 "The end of the Neopolitanian obstacle, Rome is ours to take. Taking Rome will deal a serious damage to catholicism and end all western claims for the mantle of roman empire."
BLM_invest_in_rome_title:0 "Invest in Rome"
BLM_invest_in_rome_desc:0 "The conquest of Rome was a brutal and long war. The city is in shambles. We can show the residents our generiosity and restore the city. In the meantime, we must destroy the St. Peter Basilica and build a new orthodox cathedral. Symbolising our victory versus catholicism."
BLM_take_sicily_title:0 "Take Sicily"
BLM_take_sicily_desc:0 "The island of Sicily is under the control of Aragon. Taking the island will be a challenging because of logistic reasons. Conquering Sicily will open us the way to the West Mediterranean Sea."
BLM_take_corsica_and_sardinia_title:0 "Take Corsica And Sardinia"
BLM_take_corsica_and_sardinia_desc:0 "Sardinia and Corsica are the biggest island along with Sicily in the italian region. Acquiring these two will pave the way for a total domination in Italy. If Italy fall under us, the entire Mediterranean Sea will be under our control and force our monopole on goods from Asia."
BLM_reinforce_malta_title:0 "Reinforce Malta"
BLM_reinforce_malta_desc:0 "Malta is a heavy fortified stronghold. Investing in it, will become a good base of operations in the Mediterranean. Malta will be our starting point in ending the berber threat on the sea."
BLM_liberate_macedonia_title:0 "Liberate Macedonia"
BLM_liberate_macedonia_desc:0 "The majority population of Macedonia is bulgarian. It is our duty to liberate and integrate them with us. All bulgarians must be united in one realm."
BLM_reach_the_adriatic_title:0 "Reach The Adriatic"
BLM_reach_the_adriatic_desc:0 "The albanian struggle is an expample for all of us. The time has come for them to accept their fate as a part of the bulgarian realm."
BLM_campaign_in_greece_title:0 "Campaign In Greece"
BLM_campaign_in_greece_desc:0 "With the end of Albania, the greek lands are in our grasp. There is no serious threat in the area to resist our offansive."
BLM_conquest_of_constantinople_title:0 "Conquest Of Constantinople"
BLM_conquest_of_constantinople_desc:0 "'The City of World's Desire' is in our hands. The time has come to proclaim our claim for the Roman Empire. The Bulgarian Empire is the true successor of Rome and that Rome will never fall."
BLM_take_anatolian_coast_title:0 "Take Anatolian Coast"
BLM_take_anatolian_coast_desc:0 "The Balkans are under our control. We must invade Anatolia in order to preserve the integrity of the Balkans and Europe to never be stained by the muslim plague."
BLM_push_into_syria_title:0 "Push Into Syria"
BLM_push_into_syria_desc:0 "We must continue our conquest of the arabs. The 3 of the 5 pentarchies are under the muslims. We must liberate them from the heathens, starting with Antioch"
BLM_liberate_the_holy_city_title:0 "Liberate The Holy City"
BLM_liberate_the_holy_city_desc:0 "Jerusalem is the holy city of Christianity. Numerous crusades tried to take it but failed. It is up to us to liberate the holy city from the muslim terror."
BLM_into_egypt_title:0 "Into Egypt"
BLM_into_egypt_desc:0 "The Mamlukian governemnt is weakened. We must take the oportunity to seize their core teritories and Alexandria and establishing the Egyptian puppet state to keep the population in check."
BLM_invade_iraq_title:0 "Invade Iraq"
BLM_invade_iraq_desc:0 "Pushing towards Persia through the scorching sands is a costly endaivor. With enough support, the iraqis, will be aligned with our empire and religion and are a perfect buffer state."
BLM_crusade_against_the_arabs_title:0 "Arabian Crusade"
BLM_crusade_against_the_arabs_desc:0 "The time has come to end the birthplace of Islam - Arabian peninsula. It fall to us to rid the world from the muslim plague. Establishin a puppet state in the region will help us in the spreading of christianity."
BLM_dominate_anatolia_title:0 "Dominate Anatolia"
BLM_dominate_anatolia_desc:0 "In the inland Anatolia is still majority muslim. If we want to get rid of Islam, we must force them to convert, either through conquest or with a puppet in the region."
BLM_caucasian_allies_title:0 "Caucasian Allies"
BLM_caucasian_allies_desc:0 "Caucasian nations are surrounded by enemies. The tatars from the north are trying to raze them. The turks and persians from the south are eying their territories by force. We must intevene to protect them by alliance or a union."
BLM_invest_in_the_land_title:0 "Invest In The Land"
BLM_invest_in_the_land_desc:0 "For a prosporous nation, we need a well-developed land to feed our common folk. Our core teritories will be developed to supply even the army in their marches outside our borders."
BLM_main_aegean_port_title:0 "Investment In Solun"
BLM_main_aegean_port_desc:0 "We hold the biggest city located in the Aegean Sea. We must expand it, so it can gives us a monopoly over the Aegean and pressure the westerners to retreat from our trade nodes."
BLM_expand_adriatic_trade_title:0 "Investment In The Adriatic"
BLM_expand_adriatic_trade_desc:0 "Developing our adriatic coast cities - Ragusa in particular - we will achieve dominance over the trade routes betwenn us and the West. Adriatic Sea is also home of the Venice merchants. Hitting their home trade node, will lead to their downfall."
BLM_crimean_trade_expansion_title:0 "Crimean Trade Expansion"
BLM_crimean_trade_expansion_desc:0 "After the fall of Crimean Khaganate, we are dominating the north Black Sea. Investing in there, will give us an oportunity to expand our trade reach beyoun the Ural mountain."
BLM_develop_the_asian_trade_title:0 "Asian Trade Routes"
BLM_develop_the_asian_trade_desc:0 "Our invasion in Syria and Arabia paves us the way towards the Far Eastern traders - indians and chinese. While the Westerners try to circle around Africa for a better trade route to India, we can invest in the one coming from Syria."
BLM_alexandian_trade_route_title:0 "Egyptian Trade Investment"
BLM_alexandian_trade_route_desc:0 "Now that Egypt is under our control and our previous trade expansions in Syria, we will invest in Alexandia too, so we can solidify and monopolize our influence in the asian and african trade routes."
BLM_invest_in_macedonia_and_greece_title:0 "Development Of Macedonia And Greece"
BLM_invest_in_macedonia_and_greece_desc:0 "After our development of the core teritories, it is obvious that Macedonia and Greece will be next. Macedonia because it populated by our people and Greece because of its strategic location of cities, such as Athens."
BLM_romania_title:0 "Development of Romania"
BLM_romania_desc:0 "The romanians were always under someone more powerful than them. They have endured cruelties for decades. It is now time to show them kindness and invest in their cities. Hopefully this will pacify them."
BLM_develop_serbia_title:0 "Develop Serbia"
BLM_develop_serbia_desc:0 "Investing in the serbian land will pave the way for a cooperation between us. It is time for them to bend the knee to their new suzerain."
BLM_thrace_title:0 "Developing Thrace"
BLM_thrace_desc:0 "Developing thrace region will not only be more benefitial to us, it will strenghten to prestige of our capital - Tsarigrad."
BLM_fund_anatolian_coast_line_title:0 "Invest In The Anatolian Coast"
BLM_fund_anatolian_coast_line_desc:0 "Developing only our European teritories isn't enough. In order to expand our reach towards Asia, we must invest in Anatolia first, to have a safer routes between the 2 continents."
BLM_center_of_world_trade_title:0 "Center Of The World Trade"
BLM_center_of_world_trade_desc:0 "Our policy of expanding the trade routes and nodes paid off. Bulgaria is knows around the world as the master of trade. Everything that goes between Europe, Asia and Africa is going through us. Tsarigrad is knows as the World Trade Center. With this achievement, we are now able to expand our influence over the Far Eastern countires. Influencing them will cripple the westerners, trying to go around us to trade with them."
BLM_fund_athens_title:0 "Expanding Athens"
BLM_fund_athens_desc:0 "Conquering Athens gives us another big port in East Mediterranean Sea. Investing it to trade with asian goods will give a second option for the Central European countries to get asian goods, thus enriching ourselves."
BLM_izmir_title:0 "Fund Izmir Development"
BLM_izmir_desc:0 "Establishin Izmir as a trade center in Asia will not just lower the burden of Tsarigrad but also leading to even more goods from asian pouring the european market."
BLM_expand_tsarigrad_title:0 "Expanding Tsarigrad"
BLM_expand_tsarigrad_desc:0 "Since our development policies, Tsarigrad is expanding too much for us to handle. We should develop the other side of the Bosphorus, in order to let Tsarigrad grow in Anatolian peninsula. Doing so will make it the first city in 2 continents."
BLM_invest_in_the_core_territories:1 "Invest the core bulgarian teritories each with §J2§! random development."
BLM_develop_romania:1 "Invest the romanian teritories each with §J1§! random development."
BLM_invest_in_serbia:1 "Invest the serbian teritories each with §J2§! random development."
BLM_invest_in_the_capital:1 "Invest the Thrace region with §J3§! random development in each teritory."
BLM_invest_in_anatolia:1 "Invest the anatolian coast teritories each with §J2§! random development."
BLM_invest_in_the_west:1 "Invest the macedonian and greek teritories each with §J2§! random development."
BLM_colonial_interest_title:2 "Colonial Interest"
BLM_colonial_interest_desc:2 "While we expand in the Balkans, news from the west say of a unrule land beyound the sea, filled with riches. We must fund an expedition to find this land and take all its riches for us."
BLM_find_the_caribbean_islands_title:2 "Find the Caribbeans"
BLM_find_the_caribbean_islands_desc:2 "The western expeditions speak of a group of islands across the ocean. We must find and secure them as a naval port for a future colonisation of the new world."
BLM_found_the_caribbean_colony_title:2 "Found the Caribbean Colony"
BLM_found_the_caribbean_colony_desc:2 "Our efforts to secure the Caribbeans have proven successful. We will establish a colonial government to rule these land in the name of the [BUL.Monarch.GetTitle]"
BLM_colonial_fund:2 "Colonial Funds"
BLM_Karibskata_Koloniq:2 "Karibska Koloniq"
bulgarian_colony_in_the_caribbean:2 "§Y[Root.GetName]§! or a colonial nation must own at least 7 provinces in the Caribbeans."
BLM_find_the_new_continent_title:2 "Find the New Continent"
BLM_find_the_new_continent_desc:2 "The new world cant be just a bunch of island. We need to find the bigger land that we heard about."
BLM_new_continent:2 "The New Continent"
BLM_settle_the_continent_title:2 "Settle the New Continent"
BLM_settle_the_continent_desc:2 "We found it! Now its time to settle the new land before our european rivals do the same."
bulgarian_colony_in_america:2 "§Y[Root.GetName]§! or a colonial nation must own at least 6 provinces in the Eastern America."
BLM_expedition:2 "The Expeditions"
BLM_conquer_america_title:2 "American Conquest"
BLM_conquer_america_desc:2 "We now have a sizeble presence in the New World. The Golden Age of [Root.GetName] has trully begun."
BLM_america_conquered:2 "American Tsardom"
bulgarian_colony_in_america_big:2 "§Y[Root.GetName]§! or a colonial nation must own at least 50 provinces in the Eastern America."
BLM_sail_south_title:2 "Sail South"
BLM_sail_south_desc: "While the main expedition is sailing west to find the New World, another one will sail south to circle around Africa and reach Asia by sea."
helena_finding:2 "§Y[Root.GetName]§! has reached an island at the edge of Africa."
BLM_settle_the_south_title:2 "Settle the South"
BLM_settle_the_south_desc:2 "Souther Africa is uncolonised. We must take it so that the connection between the west and east is under our control."
bulgarian_colony_in_africa:2 "§Y[Root.GetName]§! or a colonial nation holds at least 5 fully developed provinces in South Africa."
BLM_kongo_and_madagascar_title:2 "Kongo and Madagascar"
BLM_kongo_and_madagascar_desc:2 "With a foothold in Africa established, we must take the inferior african kingdoms in Madagascar and Kongo for the cheap labour in our other oversea colonies."
bulgaria_madagascar:2 "§Y[Root.GetName]§! has conquered Madagascar."
bulgaria_kongo:2 "§Y[Root.GetName]§! has conquered Kongo."
BLM_african_dominion_title:2 "African Dominion"
BLM_african_dominion_desc:2 "Our expansion in Africa has proven successful. We can halt our conquest and strenghten our control over South Africa and the slave trade or push for expanding over Central Africa."
BLM_sail_east_title:2 "Sail Further East"
BLM_sail_east_desc:2 "With established port in South Africa, we are ready to sail towards the far east."
australia_finding:2 "§Y[Root.GetName]§! has found a new continent below China and India."
BLM_settle_australia_title:2 "Settle Australia"
BLM_settle_australia_desc:2 "This is not what we expected to find but it is an uncolonised land. We should take it for ourselves."
bulgaria_australia:2 "§Y[Root.GetName]§! or a colonial nation holds at least 5 fully developed provinces in Australia."
BLM_control_the_pacific_title:2 "Control the Pacific routes"
BLM_control_the_pacific_desc:2 "The Pacific Ocean conntects the Americas and Asia. We must take control of the vital islands and establish a route to which all ships will follow."
BLM_foothold_in_india_title:2 "Indian Foothold"
BLM_foothold_in_india_desc:2 "We have reached India by sea. We must establish bases around it so we can control the vital trade routes."
BLM_take_singapore_title:2 "Take Singapore"
BLM_take_singapore_desc:2 "Singapore is the center of the spice trade and connects Indian and Pacific Oceans. We must seize it for ourselves."
BLM_chinese_trade_control_title:2 "Control the Chinese trade"
BLM_chinese_trade_control_desc:2 "China is vast and rich empire but they are isolating themselves. We will exploit this and seize their vital ports so that they are dependent on our merchants."
BLM_far_eastern_dominance_title:2 "Far Eastern Dominance"
BLM_far_eastern_dominance_desc:2 "With the established port around Asia, we successfully control all trade and all kingdoms are dependent on us."
bulgaria_spice:2 "§Y[Root.GetName]§! or a colonial nation holds at least 5 fully developed provinces in the Moluccas region."
BLM_colonial_empire_title:2 "Bulgarian Colonial Empire"
BLM_colonial_empire_desc:2 "Our colonisation of the world has elevated us as the first Global Empire. The sun shall never set on the Bulgarian Tsardom."
BLM_chinese_claims_title:3 "Chinese Claims"
BLM_chinese_claims_desc:3 "China is still standing against our complete asian domination. The time has come for another dynasty to sit on the throne of Beijing. We will incorporate the chinese empire into our own."
china_tip_tt: "We will establish a §Jcolonial government§! in China led by our dynasty. Our new administration in China will have its own mission tree that we will be able to help complete. Once completed we will be able to create a §Rpersonal union§! and rule China ourselves."
BLM_bgc_arrival_title:3 "Arrival in China"
BLM_bgc_arrival_desc:3 "Our victory in China gave us control over a small part of the chinese territory. The government in Tsarigrad is establishing our colonial government to supervise these new territories."
BLM_bgc_expanding_title:3 "Expanding into Mainland China"
BLM_bgc_expanding_desc:3 "Our mission is not just to rule over the small parts we have accuired. We must expand into China and secure a bigger foothold for the future plan House of Shishman have for the Asian continent."
BLM_bgc_securing_the_south_title:3 "Secure the Southern provinces"
BLM_bgc_securing_the_south_desc:3 "While we expand into north, the war showed us that our southern borders are easily invaded. With the northern borders secured, we should take care of our south."
BLM_bgc_consolidation_title:3 "Consolidation of The Foothold"
BLM_bgc_consolidation_desc:3 "We managed to secure a sizable foothold. We must stabilise it in order to continue towards the great goal, given by the central government."
BLM_create_the_army_title:3 "Modernize the Army"
BLM_create_the_army_desc:3 "Now that we have proven that we are a threat to the status quo, others will try to destroy us. Modernizing the army in the image of the bulgarian, will give us a fighting chance."
BLM_create_the_navy_title:3 "Modernize the Navy"
BLM_create_the_navy_desc:3 "Our navy is not in a shape to fight at all. We must invest and modernize it in order to secure our ports from enemy harrassments."
BLM_securing_the_capital_title:3 "Defending the Capital"
BLM_securing_the_capital_desc:3 "The city of Nanjing is too close to the border with almost no defense. We must build forts and push the border a bit inland to give the capital a breathing ground."
BLM_developing_the_territories_title:3 "Modernizing the Chinese Cities"
BLM_developing_the_territories_desc:3 "The chinese cities are huge compared to ours. We should reshape them in the model of a modern european cities. This will bring investment and popularity from the other nations of the world."
BLM_conversion_title:3 "Chistianisation"
BLM_conversion_desc:3 "With our presence in China, some of the chinese are interested in our religion. We should invest in this endevaour and chistianize the populaion. This will make them comply with us."
BLM_bgc_the_next_step_title:3 "The Next Step"
BLM_bgc_the_next_step_desc:3 "WE managed to stabilize our chinese territories and expand our military. The time has come to push into China even more."
BLM_bgc_expanding_the_army_title:3 "Expanding the Army"
BLM_bgc_expanding_the_army_desc:3 "Our growing realm require a bigger army to defend it. With a bigger army we can begin several campaigns in China and exhaust the emperor war machine."
BLM_army_academy_title:3 "Wuchan Land Academy"
BLM_army_academy_desc:3 "Capuring Wuchan is a strategic vicory for Shishman government. It is the biggest city in the middle of China. We should establish an academy not only to have an excuse to have a large military personel in the city, but to train the new generation for the next step in our plan - captuing Beijing."
BLM_expansion_of_the_navy_title:3 "Expanding the Navy"
BLM_expansion_of_the_navy_desc:3 "Our initial investment in the navy is not enough. In order to control the asian naval theather, we must expand our capabilities to wage war on the seas."
BLM_navy_academy_title:3 "Macau Naval Academy"
BLM_navy_academy_desc:3 "In order to keep our grand navy in a top efficency, we need a naval academy to train new recruits. All of Asia will fear our naval might."
BLM_the_interior_title:3 "Into The Interior"
BLM_the_interior_desc:3 "We are ready to begin the campaign to the next part. We must conquer more of China and we need a better fitting army and a navy to secure these new lands."
BLM_push_south_title:3 "Invading the South"
BLM_push_south_desc:3 "The rich cities in South China are vital for our war machine. They will get us wealth to expand our army and are easier to defend. Taking them will weaken the emperor's authority."
BLM_secure_the_south_title:3 "Defending the South"
BLM_secure_the_south_desc:3 "We must build defences in the most important cities in the south in order to defend them against chinese aggresion or opportunist leaders in Asia such as the japanese shogun."
BLM_push_the_north_title:3 "Getting close to Beijing"
BLM_push_the_north_desc:3 "Even though unpopular to get this close to the emperor, the Shishman dynasty decided to go for it. If we manage to seize these areas, we can threaten the emperor's authority and spark rebellions against him. Divide and conquer tactic."
BLM_securing_the_north_title:3 "Defending the North"
BLM_securing_the_north_desc:3 "Even though we managed to take the northern provinces, we must quickly establish a defensive fortifications in vital parts in order to secure them from the attack from the chinese elite armies stationed in Beijing."
BLM_push_to_wuchan_title:3 "Push to Wuchan"
BLM_push_to_wuchan_desc:3 "Splitting the chinese empire will be successful only if we take the city of Wuchan. This will not be an easy task but achieving it will severely weaken the chinese combat capabilities."
BLM_secure_the_center_title:3 "Defending the Center"
BLM_secure_the_center_desc:3 "Defending the center is extremely challenging task. Wuchan can be encircled without us noticing in time if we dont constuct whatch towers and forts around the vital points."
BLM_parly_achieved_goal_title:3 "Halfway Done"
BLM_parly_achieved_goal_desc:3 "We are now a strong contender for overlordship over the chinese population. The next focus should be to stabilize our newly conquered territories and expand even furher into China."
BLM_get_to_tibet_title:3 "Race to Tibet"
BLM_get_to_tibet_desc:3 "The southern parts of China pose no threat. We must take them before someone else find out that China is on the brink of collapse."
BLM_defend_the_border_title:3 "Defending the Border"
BLM_defend_the_border_desc:3 "We managed to take all of South China. But some of the opportunist kingdoms in Burma and India think we cant defend successfully and might invade. We will show them not to mess with Bulgaria."
BLM_northern_expedition_title:3 "The Northern Campaign"
BLM_northern_expedition_desc:3 "The time has come. China is too weak to resist us and we must capture their capital Beijing. Eliminating the emperor is of utmost importance for the coronation of a new one."
BLM_maintain_the_great_wall_title:3 "Maintain the Great Wall"
BLM_maintain_the_great_wall_desc:3 "The Great Wall of China really is a magnificent creation of mankind. It is now up to us to maintain it and use it to defend our vast northern border against the mongols."
BLM_conquer_tibet_title:3 "Conquer Tibet"
BLM_conquer_tibet_desc:3 "Conquering Tibet will be a challenging campaign because its territories lies on the mountains. If we manage to achieve it, defending it against indians will be far more easy."
BLM_tibetian_question_title:3 "Tibetian Question"
BLM_tibetian_question_desc:3 "Tibet is ours! Now the question it what to do with these territories. The Head of House Shishman in Asia will summon the advisors to decide their next step."
BLM_into_korea_title:3 "Into Korea"
BLM_into_korea_desc:3 "China is sure to fall. Korea is a strong kingdom on the northern parts of China. The generals advice invading Korea because we are not the only ones who laid eyes on them."
BLM_korean_question_title:3 "Korean Question"
BLM_korean_question_desc:3 "In spite of the japanese warmongers we managed to take all of Korea. We must now decide what to do with the newly conquered territories."
BLM_initial_conversion_title:3 "Initial Conversion"
BLM_initial_conversion_desc:3 "Alongside our conquest, the clergy are tirelesly working on introducing China to christianity. This will be a long process and will weaken our legitimy in the eyes of the chinese until they become also christian."
BLM_massive_conversion_title:3 "Christian China"
BLM_massive_conversion_desc:3 "With the chinese converting to christianity en masse, we can use this to proclaim a new, christian, dynasty in Beijing."
conversion_of_south_china:3 "All provinces in the §RSouth China region§! must have our religion."
conversion_of_north_china:3 "All provinces in the §RNorth China region§! must have our religion."
conversion_of_west_china:3 "All provinces in the §RWest China region§! must have our religion."
BLM_the_new_capital_title:3 "The New Capital"
BLM_the_new_capital_desc:3 "Out conquest of China is successful. With the death of the heathen emperor, the now chistian chinese population expect a christian dynasty to sit on the Jade Throne."
BLM_complete_takeover_title:3 "Complete Takeover"
BLM_complete_takeover_desc:3 "We stabilized and developed the chinese provinces. With our grip secured, all of Asia is awaiting to see what will come next. Let us send a message to Tsarigrad and inform them of our readiness. Now all cards are in their hand to proclaim a new chinese dynasty - House of Shishman."
BLM_completion:3 "We have completed our mission. Now only §JBulgaria§! can decide what will happen to §RChina§!."
BLM_the_new_dynasty_title:3 "New Chinese Dynasty"
BLM_the_new_dynasty_desc:3 "Our colony in China has laid the groundwork for all these years. Now the time has come for China to see a new dynasty rise in Beijing. A dynasty that will last at least 1000 years - House of Shishman."
the_new_china:3 "The time has come to crown our §JTsar§! as the §TEmperor of China§!."
KITAI:3 "Tsardom of Kitai"
KITAI_ADJ:3 "Kitajski"