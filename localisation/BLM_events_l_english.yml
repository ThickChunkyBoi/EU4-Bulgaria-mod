flavor_bul.19.t: "American Ambition"
flavor_bul.19.d: "Our american colonisation is succsessful. With a strong foothold on the new world we can expand our colonisation funding for control over the entire continent or we can stop and streghten our grip over the land we already control. [Root.Monarch.GetTitle] will summon his court, decide what to do and sent the orders to the governors oversea."
flavor_bul.19.a: "We need stable colonies!"
flavor_bul.19.b: "The riches of the entire continent will be ours!"
BLM_fortify_our_hold: "Streghtening our grip"
BLM_expansion: "American Expansion"
flavor_bul.20.t: "Our African Ambitions"
flavor_bul.20.d: "The time has come to decide what to do with Africa. Some say to fortify our position as a global slave trader and instead of conquering the other kingdoms, we should trade with them. Others believe that in order to expand our slave trades even further we should take Central Africa and enforce our rule over them. [Root.Monarch.GetTitle] will have the final word."
flavor_bul.20.a: "We dont need the rest of Africa!"
flavor_bul.20.b: "Africa must be ours!"
flavor_bul.21.t: "Asian Ambition"
flavor_bul.21.d: "Our Empire is controlling the main trade routes in Asia. The riches of the far east will pour into our cities and enrich our people. We can stabilise our current domain or expand even further so that nobody can rival our Empire."
flavor_bul.21.a: "We should streghten our grip over our domain."
flavor_bul.21.b: "We must expand further into Indonesia."
flavor_bul.21.c: "Indochina will be ours."
BGC: "Shishman"
BGC_ADJ: "Shishmanian"
BGC_ADJ2: "Shishmanian"
flavor_bgc.1.t: "Establishment"
flavor_bgc.1.d: "Taking a small part of the chinese territory, we are ready to establish a colonial government led by the Shishman dynasty. We must expand into China while the emperor is busy, to secure our survival. These are just the first steps towards the greater goal - control over all of China in the name of the Tsar."
flavor_bgc.1.a: "Pushing into China."
flavor_bgc.2.t: "The First Steps"
flavor_bgc.2.d: "We managed to capture a small foothold in China that surrounds the city of Nanjing - one of the most important cities in China. We will set a capital in this city, risking angering the chinese emperor. This will give us a legitimacy in the eyes of the chinese population. If they accept our leadership, we will be able to further weaken the position of the emperor."
flavor_bgc.2.a: "Set up the new capital."
flavor_bgc.3.t: "The Next Step"
flavor_bgc.3.d: "Our centralization and consolidation of the initial chinese territories we conquered is proving succsessful. Now with newfound streght, we will be able to push our territory in 3 directions - center to Wuchan, south to Macau and north at the Shandong provinces. Cutting China in different pieces will make it easier to conquer. Divide et impera!"
flavor_bgc.3.a: "Draw the plans!"
flavor_bgc.4.t: "Where to Strike First?"
flavor_bgc.4.d: "Even though we are much stronger, we still cant spread our army in every direcion. This could be a disaster. The government must focus its might in 1 direction. The least people advocate in striking the north in order to get closer to Beijing. Others suggest invading the center and capturing Wuchan. This will be a huge success because we could split China in 2 but defending it will prove extremly costly and hard. The safest option appears to be the south. Securing Macau and Hongkong will criple China. But the decision lies in the House of Shishman. Choose wisely!"
flavor_bgc.4.a: "Strike the North!"
flavor_bgc.4.b: "Invade the Center!"
flavor_bgc.4.c: "Secure the South!"
flavor_bgc.5.t: "The Last Step"
flavor_bgc.5.d: "We have conquered a sizable territory from China but its not enough. Our next goal is to capture the remaining and stabilize our realm. By now large groups from the clergy have arrived to christianize China. Even though the we are halfway done, we must push in order to preserve our government."
flavor_bgc.5.a: "China will fall before us!"
flavor_bgc.6.t: "Tibetian Question"
flavor_bgc.6.d: "With the conquest of Tibet came the dilemma what to do with them. Some suggest to integrate them into the colonial government, christianizing them. Others believe we should establish a puppet christian Tibet, under the direct control of Tsarigrad. The head of the Shishman government will decide."
flavor_bgc.6.a: "Tibet will be part of China."
flavor_bgc.6.b: "Establish a puppet nation and contact Tsarigrad."
flavor_bgc.7.t: "Korean Question"
flavor_bgc.7.d: "Conquering Korea managed to do 2 things. First our capital is more secured because theres no sizeble resistance and the ambition of the japanese are crushed. Not the question arise what to do with Korea. Should we integrate them or establish a kingdom under the overlordship of Tsarigrad is up to the head of Shishman dynasty in Asia."
flavor_bgc.7.a: "From now on Korea is part of China."
flavor_bgc.7.b: "The government in Tsarigrad will be pleased with a puppet Korea."
flavor_bul.22.t: "The Matter of Korea and Tibet"
flavor_bul.22.d: "With the successful campaign of our colonial government in China, they managed to take Tibet and Korea. We will accept whatever they decide to do with these 2 regions. Either way we are the big winner."
flavor_bul.22.a: "They gave us dominion over both."
flavor_bul.22.b: "They gave us dominion over one."
flavor_bul.22.c: "They integrated them into China."