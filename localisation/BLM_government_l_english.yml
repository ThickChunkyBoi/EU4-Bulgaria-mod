l_english:
BLM_bulgarian_tsardom_reform:0 "Bulgarian Tsardom"
BLM_bulgarian_tsardom_reform_desc:0 "Simeon I was crowned Tsar, or the greek "basileus", from the Patriarch of Constantinople in 913, this title was used until the fall of the First Empire in 1018 and during the Second Empire from 1185 until 1396. We must use our heritage to claim that title once again and proclaim The Third Bulgarian Empire."
BLM_dominate_the_nobles:0 "Dominate The Nobles"
BLM_dominate_the_nobles_desc:0 "The nobility awlays side with the most powerful realm, even if that nation is our enemy. They cannot be trusted. The Tsar must force them to give up their lands to the crown and to swear an oath to work for Bulgaria only."
BLM_royal_centralization:0 "Royal Centralization"
BLM_royal_centralization_desc:0 "Once the nobles are under the control of the crown, we must push into further centralization into the lands of the other estates. The entire land must work for the betterment of the Bulgarian Tsardom."
BLM_reformed_bulgarian_army:0 "Reformed Bulgarian Army"
BLM_reformed_bulgarian_army_desc:0 "Establishing of a new professional, disciplined and well-trained army will guarantee our safety and expansion plans."
BLM_reformed_tsardom:0 "Reformed Tsardom"
BLM_reformed_tsardom_desc:0 "Everything is under the control of the Tsar and his dynasty. Bulgaria will be safe from internal conflict while everything and everyone is under the protection of His Majesty."
BLM_state_sponsored_trade:0 "State Sponsored Trade"
BLM_state_sponsored_trade_desc:0 "Our geographical position gives us the unique oppurtunity to profit from the main trade route between Europe and Asia. The merchant must be encouraged to broaden their horizons. Controlling this trade route, we can exart influence over the asians."
BLM_bulgarian_constitution:0 "Bulgarian Constitution"
BLM_bulgarian_constitution_desc:0 "Age of Enlightenment gave birth to new ideas around Europe. New liberal and the toleration of the different opinion gave rise of the call for a reform. Too long the Tsar and his dynasty ruled over the entire aspect of the nation. They want a creation of a Constitution that will guard the liberty and rights of men."
BLM_bulgarian_senate:0 "Bulgarian Senate"
BLM_bulgarian_senate_desc:0 "The absolute power of the Tsar is divided between him and the newly established senate. The senators will preserve the people and the nation from coming back under the absolute control of the royal family."
BLM_shishman_administration:1 "The New Administration Of China"
BLM_shishman_administration_desc:1 "With the establishement of a foothold in China, we are able to create a new administration headed by our dynasty. We will rival and hopefully in the future to lead the chinese."
BLM_assimilating_the_nobility:1 "Assimilating The Chinese Nobility"
BLM_assimilating_the_nobility_desc:1 "The first steps in controling China is to make the nobles to bend the knee. We will swarm the chinese lands with bulgarian nobles and rich bourgeoisie. Giving privileges to ours and those who accept our tradisions and religion, the chinese nobles will be forced to work for us."
BLM_centralizing_china:1 "Chinese Cenralization"
BLM_centralizing_china_desc:1 "For centuries chinese dynasties are fighting for the imperial throne. This led to decentralization of the region, where the Emperor is forced to compromise with powerful warlords in order to preserve stabiliy. With our arrival this structure will be replaced with a cenralized form of government where those warlords inside our territory will be forced to accept our rule unconditionaly or be disposed off."
BLM_orthodox_china:1 "Christianisation Of China"
BLM_orthodox_china_desc:1 "With our expansion in China, came a proposition from the Bulgarian Church in Tsarigrad to convert the chinese population. This will weaken our rule for a while but in the long run, the chinese will be more inclined to accept our rule."
BLM_bulgarian_model:1 "Adapting The Bulgarian Model"
BLM_bulgarian_model_desc:1 "The reforms in Bulgaria proved successful. We should adapt them in our colonial army. None shall stop us in ruling China."
BLM_recognised_authority:1 "Partial Success"
BLM_recognised_authority_desc:1 "Our reforms in the chinese territories we control are giving results. The people under our rule are accepting our culture and religion. There is still much to do before the masterplan to be revealed to the world."
BLM_colonial_trade:1 "Colonial Trade"
BLM_colonial_trade_desc:1 "Our duty as a colonial nation is to bring all riches of China back into Bulgaria. This will not be liked by the population but in the end they have to accept it as the new norm."
BLM_complete_control:1 "Complete Control"
BLM_complete_control_desc:1 "China is under our rule. Our religion has replaced the chinese one and we are able to maintain control over the population. It is time for the masterplan to be implemented - the creation of the Tsardom of Kitai."